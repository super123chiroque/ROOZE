<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1B2A4A"/>
  <title>NotaVenta Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#1B2A4A;--navy-l:#243660;
      --green:#059669;--warn:#D97706;--red:#DC2626;
      --bg:#F5F5F7;--bdr:#E5E7EB;
      --txt:#111827;--txt2:#6B7280;--txt3:#9CA3AF;
      --sb-w:220px;
    }
    html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sb-w);background:#fff;border-right:1px solid var(--bdr);
      display:flex;flex-direction:column;
      position:fixed;top:0;left:0;height:100vh;z-index:200;
      transition:transform .25s ease;
    }
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}
    .sb-logo{padding:18px 16px 12px;border-bottom:1px solid var(--bdr);}
    .sb-logo-name{font-size:15px;font-weight:700;color:var(--navy);}
    .sb-logo-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
    .sb-user{padding:10px 16px;border-bottom:1px solid var(--bdr);display:flex;gap:8px;align-items:center;}
    .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
    .av-a{background:#DBEAFE;color:#1D4ED8;}.av-v{background:#D1FAE5;color:#065F46;}
    .sb-uname{font-size:13px;font-weight:600;}.sb-urole{font-size:10px;color:var(--txt2);}
    .sb-nav{flex:1;padding:8px 0;overflow-y:auto;}
    .ns{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);padding:10px 16px 3px;}
    .nb{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--txt2);cursor:pointer;background:none;border:none;border-left:2px solid transparent;width:100%;text-align:left;min-height:44px;}
    .nb:hover{background:#F9FAFB;color:var(--txt);}
    .nb.on{background:#EFF6FF;color:var(--navy);font-weight:600;border-left-color:var(--navy);}
    .sb-foot{padding:12px 16px;border-top:1px solid var(--bdr);}

    /* ── MAIN ── */
    .shell{display:flex;min-height:100vh;}
    .main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-width:0;}

    /* ── TOPBAR ── */
    .topbar{
      background:#fff;border-bottom:1px solid var(--bdr);
      padding:12px 20px;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:100;
    }
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .topbar-title{font-size:17px;font-weight:700;color:var(--navy);}
    .topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--navy);}
    .hamburger svg{width:22px;height:22px;}

    /* ── PAGE BODY ── */
    .page{padding:20px;flex:1;}

    /* ── METRICS ── */
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
    .mc{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;}
    .mc-l{font-size:10px;color:var(--txt2);margin-bottom:3px;}
    .mc-v{font-size:22px;font-weight:700;color:var(--navy);}
    .mc-s{font-size:10px;color:var(--txt3);margin-top:2px;}

    /* ── CARDS ── */
    .card{background:#fff;border:1px solid var(--bdr);border-radius:12px;margin-bottom:16px;}
    .card-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-size:13px;font-weight:700;}
    .card-body{padding:14px 16px;}

    /* ── TABLE ── */
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:600px;}
    .tbl th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--txt2);border-bottom:1px solid var(--bdr);background:#FAFAFA;white-space:nowrap;}
    .tbl td{padding:9px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap;}
    .tbl tr:last-child td{border-bottom:none;}
    .tbl tr:hover td{background:#F9FAFB;}
    .mono{font-family:'Courier New',monospace;font-size:11px;color:var(--txt2);}

    /* ── BADGES ── */
    .bdg{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;}
    .bok{background:#D1FAE5;color:#065F46;}.bwn{background:#FEF3C7;color:#92400E;}
    .bin{background:#DBEAFE;color:#1D4ED8;}.bred{background:#FEE2E2;color:#991B1B;}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;min-height:40px;touch-action:manipulation;}
    .btn:active{opacity:.8;}
    .btn-p{background:var(--navy);color:#fff;}
    .btn-g{background:var(--green);color:#fff;}
    .btn-s{background:#fff;color:var(--txt);border:1px solid var(--bdr);}
    .btn-sm{padding:5px 11px;font-size:11px;min-height:32px;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-block{width:100%;margin-bottom:8px;}

    /* ── FORM ── */
    .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .fg{margin-bottom:12px;}
    label.fl{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
    .fi{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);outline:none;-webkit-appearance:none;min-height:44px;}
    .fi:focus{border-color:var(--navy);}
    textarea.fi{resize:vertical;min-height:80px;}

    /* ── TWO COLUMN LAYOUT ── */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

    /* ── PRODUCT TABLE IN FORM ── */
    .pt{width:100%;border-collapse:collapse;}
    .pt th{font-size:9px;font-weight:700;color:var(--txt2);padding:5px 4px;border-bottom:1px solid var(--bdr);text-align:left;text-transform:uppercase;}
    .pt td{padding:4px 3px;border-bottom:1px solid var(--bdr);}
    .pt tr:last-child td{border-bottom:none;}

    /* ── PAGO SUMMARY ── */
    .pago-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
    .pago-row:last-child{border-bottom:none;padding-top:10px;}
    .pago-lbl{color:var(--txt2);}
    .pago-val{font-weight:700;}

    /* ── TIENDAS GRID ── */
    .tiendas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;}
    .t-card{border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:#fff;}
    .t-card-hdr{padding:14px;display:flex;align-items:center;gap:10px;color:#fff;}
    .t-card-ini{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
    .t-card-body{padding:12px 14px;}

    /* ── ALERT ── */
    .alert{padding:12px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.6;}
    .alert-info{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;}

    /* ── LOGIN ── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1.5rem;}
    .login-card{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:2rem;width:100%;max-width:400px;}
    .login-logo{text-align:center;margin-bottom:1.5rem;}
    .login-icon{width:56px;height:56px;background:var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;}
    .login-name{font-size:22px;font-weight:700;color:var(--navy);}
    .login-sub{font-size:12px;color:var(--txt2);margin-top:4px;}
    .err-box{background:#FEE2E2;color:#991B1B;font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:14px;}

    /* ── SPINNER ── */
    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;transition:transform .25s;z-index:9999;pointer-events:none;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    /* ── BOTTOM NAV (mobile) ── */
    .bottom-nav{
      display:none;
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1px solid var(--bdr);
      z-index:150;padding-bottom:env(safe-area-inset-bottom);
    }
    .bnav-inner{display:flex;justify-content:space-around;}
    .bnav-btn{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:8px 4px;flex:1;background:none;border:none;cursor:pointer;
      color:var(--txt3);font-size:10px;font-weight:600;min-height:54px;
    }
    .bnav-btn.on{color:var(--navy);}
    .bnav-icon{font-size:20px;line-height:1;}

    /* ── NOTA DOCUMENT ── */
    .nota-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    #nota-document{
      background:#fff;color:#1a1a2e;
      font-family:system-ui,-apple-system,sans-serif;
      width:600px;
    }
    .nd-hdr{background:#1B2A4A;color:#fff;padding:18px 22px;}
    .nd-hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
    .nd-store{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .nd-ini{width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
    .nd-sname{font-size:17px;font-weight:700;}.nd-scat{font-size:10px;opacity:.7;}
    .nd-addr{font-size:10px;opacity:.7;margin-top:2px;}
    .nd-num-block{text-align:right;}
    .nd-num-lbl{font-size:8px;opacity:.6;letter-spacing:.08em;text-transform:uppercase;}
    .nd-num-val{font-size:14px;font-weight:700;font-family:'Courier New',monospace;margin-top:2px;}
    .nd-num-date{font-size:10px;opacity:.7;margin-top:4px;}
    .nd-hr{border:none;border-top:1px solid rgba(255,255,255,.15);margin:10px 0;}
    .nd-meta{display:flex;gap:16px;font-size:10px;opacity:.8;flex-wrap:wrap;}
    .nd-body{padding:16px 22px;}
    .nd-sec-t{font-size:8px;font-weight:700;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
    .nd-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
    .nd-info-lbl{font-size:9px;color:#888;margin-bottom:1px;}
    .nd-info-val{font-size:11px;font-weight:700;color:#1a1a2e;}
    .nd-prod-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px;}
    .nd-prod-table th{padding:6px 8px;background:#F3F4F6;color:#555;font-size:9px;font-weight:700;text-align:left;}
    .nd-prod-table td{padding:7px 8px;border-bottom:1px solid #E5E7EB;color:#1a1a2e;}
    .nd-totals{border-top:2px solid #E5E7EB;padding-top:10px;}
    .nd-tr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#555;}
    .nd-tr.total{font-size:16px;font-weight:700;color:#1a1a2e;padding:6px 0 4px;border-top:1px solid #E5E7EB;margin-top:4px;}
    .nd-tr.ade{color:#059669;font-weight:600;}
    .nd-tr.sal{font-size:14px;font-weight:700;color:#D97706;border-top:1px solid #FDE68A;padding-top:6px;margin-top:2px;}
    .nd-tr.paid{font-weight:700;color:#059669;}
    .nd-obs{margin-top:10px;padding:8px 10px;background:#F9FAFB;border-radius:6px;font-size:10px;color:#555;border-left:2px solid #E5E7EB;}
    .nd-coupon{margin:12px 0;border:2px dashed #F59E0B;border-radius:8px;background:#FFFBEB;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .nd-coupon-icon{font-size:24px;flex-shrink:0;}
    .nd-ctitle{font-size:11px;font-weight:700;color:#92400E;margin-bottom:2px;}
    .nd-cdesc{font-size:9px;color:#B45309;}
    .nd-code-block{margin-left:auto;text-align:right;}
    .nd-code{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:#92400E;background:#FDE68A;padding:3px 10px;border-radius:5px;letter-spacing:.1em;}
    .nd-code-val{font-size:9px;color:#B45309;margin-top:3px;}
    .nd-footer{background:#F9FAFB;border-top:1px solid #E5E7EB;padding:10px 22px;font-size:9px;color:#9CA3AF;text-align:center;line-height:1.7;}

    /* ════════════════════════════════════════
       RESPONSIVE — MÓVIL
    ════════════════════════════════════════ */
    @media(max-width:768px){
      /* Sidebar se convierte en drawer */
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .sidebar-overlay.open{display:block;}

      /* Main ocupa todo */
      .main{margin-left:0;}

      /* Topbar móvil */
      .hamburger{display:flex;}
      .topbar{padding:10px 14px;}
      .topbar-title{font-size:15px;}
      .topbar-actions .btn span{display:none;} /* ocultar texto, solo icono */
      .topbar-actions .btn{padding:8px 10px;min-width:40px;}

      /* Página */
      .page{padding:14px;padding-bottom:80px;} /* espacio para bottom nav */

      /* Metrics: 2x2 en móvil */
      .metrics{grid-template-columns:1fr 1fr;gap:8px;}
      .mc-v{font-size:18px;}

      /* Two column → one column */
      .two-col{grid-template-columns:1fr;}
      .form-grid-2{grid-template-columns:1fr;}

      /* Inputs más grandes para touch */
      .fi{font-size:16px;} /* evita zoom en iOS */

      /* Tabla historial: scrollable */
      .tbl-wrap{border-radius:12px;border:1px solid var(--bdr);}
      .card .tbl-wrap{border:none;border-radius:0;}

      /* Tiendas: 1 columna */
      .tiendas-grid{grid-template-columns:1fr;}

      /* Topbar acciones: botones pequeños */
      .topbar-actions{gap:6px;}

      /* Nota doc: scroll horizontal */
      .nota-scroll-wrap{margin:0 -14px;padding:0 14px;}

      /* Bottom nav visible */
      .bottom-nav{display:block;}

      /* Ocultar sidebar footer en móvil (se usa bottom nav) */
      .sb-foot{display:none;}

      /* Toast sube más en móvil */
      #toast{bottom:70px;}

      /* Producto table en form: scroll */
      .pt-wrap{overflow-x:auto;}
      .pt{min-width:420px;}
    }

    @media(max-width:400px){
      .metrics{grid-template-columns:1fr 1fr;}
      .mc{padding:10px;}
      .mc-v{font-size:16px;}
    }
  </style>
</head>

function fmt(n){return 'S/ '+(parseFloat(n)||0).toFixed(2);}
function totP(){return FORM.productos.reduce((a,p)=>a+(parseFloat(p.qty)||0)*(parseFloat(p.price)||0),0);}

function gc(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='NV-';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function td(){return new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function nn(){return 'NV-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-4);}
function ini(n){return(n||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()||'US';}
function gs(id){return STORES.find(s=>s.id==id)||{};}

function toast(m,d=3000){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}

function goTo(v){VIEW=v;render();window.scrollTo(0,0);closeSidebar();updateBottomNav();}

function updateBottomNav(){
  ['dashboard','nueva','historial'].forEach(id=>{
    const el=document.getElementById('bn-'+id);
    if(el) el.classList.toggle('on', VIEW===id||(id==='nueva'&&VIEW==='preview'));
  });
  const bn=document.getElementById('bottom-nav');
  if(bn) bn.style.display=VIEW==='login'?'none':'block';
}

// ─── AUTH ──────────────────────────────────────────
async function loadData(){
  if(DEMO_MODE){STORES=DS;SELLERS=DV;NOTAS=DN;if(!FORM.storeId)FORM.storeId=STORES[0]?.id;if(!FORM.sellerId)FORM.sellerId=SELLERS[0]?.id;return;}
  const[ts,vs,ns]=await Promise.all([
    db.collection('tiendas').orderBy('nombre').get(),
    db.collection('vendedores').where('activo','==',true).get(),
    (AUTH.role==='vendedor'&&AUTH.storeId
      ?db.collection('notas_venta').where('tienda_id','==',AUTH.storeId)
      :db.collection('notas_venta')).orderBy('created_at','desc').limit(100).get()
  ]);
  STORES=ts.docs.map(d=>({id:d.id,...d.data()}));
  SELLERS=vs.docs.map(d=>({id:d.id,...d.data()}));
  NOTAS=ns.docs.map(d=>({id:d.id,...d.data()}));
  if(!FORM.storeId)FORM.storeId=AUTH.storeId||STORES[0]?.id;
  if(!FORM.sellerId)FORM.sellerId=SELLERS[0]?.id;
}

const ERR={'auth/user-not-found':'Usuario no encontrado.','auth/wrong-password':'Contraseña incorrecta.','auth/invalid-credential':'Email o contraseña incorrectos.','auth/too-many-requests':'Demasiados intentos.','auth/invalid-email':'Email inválido.'};

async function signIn(email,pass){
  if(DEMO_MODE){AUTH.user={email};AUTH.role=email.toLowerCase().includes('admin')?'admin':'vendedor';AUTH.name=email.toLowerCase().includes('admin')?'Admin Principal':'Carlos Medina';AUTH.storeId=AUTH.role==='vendedor'?'1':null;await loadData();goTo('dashboard');return{error:null};}
  try{
    const cred=await fbAuth.signInWithEmailAndPassword(email,pass);
    const prof=(await db.collection('usuarios').doc(cred.user.uid).get()).data()||{};
    AUTH.user=cred.user;AUTH.role=prof.rol||'vendedor';AUTH.name=prof.nombre_completo||email;AUTH.storeId=prof.tienda_id||null;
    await loadData();goTo('dashboard');return{error:null};
  }catch(e){return{error:{message:ERR[e.code]||'Error al ingresar.'}};}
}

async function doSignOut(){if(!DEMO_MODE)await fbAuth.signOut();AUTH={user:null,role:'admin',name:'',storeId:null};FORM=resetForm();goTo('login');}

async function saveNota(data){
  if(DEMO_MODE){NOTAS.unshift({id:data.numero,...data});toast('✓ Nota guardada');return{error:null};}
  try{
    const b=db.batch();
    const ref=db.collection('notas_venta').doc();
    b.set(ref,{...data,created_at:firebase.firestore.FieldValue.serverTimestamp(),creado_por:AUTH.user?.uid||null});
    b.update(db.collection('tiendas').doc(data.tienda_id),{total_notas:firebase.firestore.FieldValue.increment(1)});
    if(data.vendedor_id)b.update(db.collection('vendedores').doc(data.vendedor_id),{total_notas:firebase.firestore.FieldValue.increment(1)});
    await b.commit();
    toast('✓ Guardado en Firebase');return{error:null};
  }catch(e){return{error:e};}
}

// ─── EXPORT ────────────────────────────────────────
async function exportPDF(){
  const el=document.getElementById('nota-document');if(!el)return;
  const btn=document.getElementById('btn-pdf');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  try{
    await html2pdf().set({margin:[8,8,8,8],filename:`NotaVenta-${FORM.notaNum}-${FORM.cliente.nombre}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:'avoid-all'}}).from(el).save();
    toast('✓ PDF descargado');
  }catch(e){toast('Error: '+e.message);}
  if(btn){btn.disabled=false;btn.innerHTML='📄 PDF';}
}

async function exportJPG(){
  const el=document.getElementById('nota-document');if(!el)return;
  const btn=document.getElementById('btn-jpg');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  try{
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',scrollY:-window.scrollY});
    const lnk=document.createElement('a');lnk.download=`NotaVenta-${FORM.notaNum}-${FORM.cliente.nombre}.jpg`;lnk.href=canvas.toDataURL('image/jpeg',.96);lnk.click();
    toast('✓ Imagen descargada');
  }catch(e){toast('Error: '+e.message);}
  if(btn){btn.disabled=false;btn.innerHTML='🖼️ JPG';}
}

      <div style="margin-bottom:12px;"><div class="nd-sec-t">Datos del cliente</div>

          <div><div class="nd-info-lbl">Nombre</div><div class="nd-info-val">${FORM.cliente.nombre||'—'}</div></div>
          <div><div class="nd-info-lbl">DNI / Documento</div><div class="nd-info-val">${FORM.cliente.doc||'—'}</div></div>
          <div><div class="nd-info-lbl">Teléfono</div><div class="nd-info-val">${FORM.cliente.tel||'—'}</div></div>
          <div><div class="nd-info-lbl">Ciudad</div><div class="nd-info-val">${FORM.cliente.ciudad||'—'}</div></div>
          <div style="grid-column:1/-1;"><div class="nd-info-lbl">Dirección de entrega</div><div class="nd-info-val">${FORM.cliente.dir||'—'}</div></div>
        </div>
      </div>
      <div style="margin-bottom:12px;"><div class="nd-sec-t">Detalle del pedido</div>
        <table class="nd-prod-table"><thead><tr><th>Producto</th><th style="text-align:center;">Cant.</th><th style="text-align:right;">P. Unit.</th><th style="text-align:right;">Subtotal</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
      <div class="nd-totals">
        <div class="nd-tr"><span>Subtotal</span><span>${fmt(t)}</span></div>
        <div class="nd-tr total"><span>TOTAL</span><span>${fmt(t)}</span></div>
        <div class="nd-tr ade"><span>✓ Adelanto (${FORM.metodo})</span><span>− ${fmt(a)}</span></div>
        ${b>0?`<div class="nd-tr sal"><span>⚠ Saldo pendiente</span><span>${fmt(b)}</span></div>`:`<div class="nd-tr paid"><span>✓ PAGADO COMPLETO</span><span>${fmt(t)}</span></div>`}
      </div>
      ${FORM.notas?`<div class="nd-obs"><strong>Obs:</strong> ${FORM.notas}</div>`:''}
      <div class="nd-coupon">
        <div class="nd-coupon-icon">🎁</div>
        <div><div class="nd-ctitle">¡Gracias! Descuento exclusivo para ti</div><div class="nd-cdesc">Válido en tu próxima compra en ${store.nombre||'nuestra tienda'} · Uso único</div></div>
        <div class="nd-code-block"><div class="nd-code">${FORM.coupon}</div><div class="nd-code-val">S/ 10.00 de descuento</div></div>
      </div>
    </div>
    <div class="nd-footer">
      <div>Nota de venta informativa — no es comprobante tributario.</div>
      <div>${store.nombre||''} · ${store.telefono||''}</div>
      <div>¡Gracias por tu confianza! 🛒</div>
    </div>
  </div>`;}

// ══════════════════════════════════════════════════
//  PREVIEW
// ══════════════════════════════════════════════════
function vPreview(){
  return shell('Vista previa',
    `<button class="btn btn-s btn-sm" onclick="goTo('nueva')"><span>← </span><span>Editar</span></button>
     <button class="btn btn-s btn-sm" id="btn-jpg" onclick="exportJPG()">🖼️ JPG</button>
     <button class="btn btn-p btn-sm" id="btn-pdf" onclick="exportPDF()">📄 PDF</button>`,
    `<div style="max-width:640px;margin:0 auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-size:12px;color:var(--txt2);">Desliza para ver completa →</span>
        <span class="bdg bok">Lista para enviar</span>
      </div>
      <div style="background:#fff;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;">
        <div class="nota-scroll-wrap">${ndoc()}</div>
      </div>
      <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button class="btn btn-s btn-block" onclick="exportJPG()">🖼️ Descargar JPG</button>
        <button class="btn btn-p btn-block" onclick="exportPDF()">📄 Descargar PDF</button>
        <button class="btn btn-s btn-block" onclick="FORM.coupon=gc();render();">🔄 Nuevo cupón</button>
        <button class="btn btn-g btn-block" onclick="sn()">✏️ Crear otra</button>
      </div>
    </div>`);}

// ══════════════════════════════════════════════════
//  HISTORIAL
// ══════════════════════════════════════════════════
function vHistorial(){
  const ia=AUTH.role==='admin';
  const rows=NOTAS.map(n=>`<tr>
    <td class="mono">${(n.id||'').slice(0,14)}</td>
    <td>${n.cliente_nombre||'—'}</td>
    <td style="font-size:11px;color:var(--txt2);">${n.ciudad||'—'}</td>
    ${ia?`<td style="font-size:11px;">${n.tienda_nombre||''}</td>`:''}
    <td>${fmt(n.total)}</td>
    <td style="color:var(--green);">${fmt(n.adelanto)}</td>
    <td style="color:${(n.total-n.adelanto)>0?'var(--warn)':'var(--green)'};">${fmt(n.total-n.adelanto)}</td>
    <td><span class="bdg ${n.estado==='pagado'?'bok':n.estado==='parcial'?'bin':'bwn'}">${n.estado||'—'}</span></td>
  </tr>`).join('');
  return shell('Historial',`<button class="btn btn-p btn-sm" onclick="sn()"><span>+</span><span> Nueva</span></button>`,
    `<div class="card"><div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>N° Nota</th><th>Cliente</th><th>Ciudad</th>${ia?'<th>Tienda</th>':''}<th>Total</th><th>Adelanto</th><th>Saldo</th><th>Estado</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--txt3);padding:24px;">Sin notas aún</td></tr>'}</tbody>
    </table></div></div>`);}

// ══════════════════════════════════════════════════
//  TIENDAS
// ══════════════════════════════════════════════════
function vTiendas(){return shell('Tiendas',`<button class="btn btn-p btn-sm">+ Nueva</button>`,
  `<div class="tiendas-grid">${STORES.map(s=>`<div class="t-card">
    <div class="t-card-hdr" style="background:${s.color};">
      <div class="t-card-ini">${s.iniciales}</div>
      <div><div style="font-size:13px;font-weight:700;">${s.nombre}</div><div style="font-size:10px;opacity:.8;">${s.categoria}</div></div>
    </div>
    <div class="t-card-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div><div style="font-size:22px;font-weight:700;color:var(--navy);">${s.total_notas||0}</div><div style="font-size:9px;color:var(--txt3);">notas emitidas</div></div>
        <button class="btn btn-s btn-sm">Editar</button>
      </div>
      <div style="font-size:11px;color:var(--txt2);display:flex;flex-direction:column;gap:3px;"><span>📍 ${s.direccion}</span><span>📞 ${s.telefono}</span></div>
    </div>
  </div>`).join('')}</div>`);}

// ══════════════════════════════════════════════════
//  VENDEDORES
// ══════════════════════════════════════════════════
function vVendedores(){
  const rows=SELLERS.map(s=>{const st=gs(s.tienda_id)||{};return`<tr>
    <td><div style="display:flex;align-items:center;gap:8px;"><div class="av av-v">${ini(s.nombre)}</div>${s.nombre}</div></td>
    <td><span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:${st.color||'#888'};display:inline-block;"></span><span style="font-size:11px;">${st.nombre||'—'}</span></span></td>
    <td><strong>${s.total_notas||0}</strong></td>
    <td><span class="bdg ${s.activo?'bok':'bred'}">${s.activo?'Activo':'Inactivo'}</span></td>
    <td><button class="btn btn-s btn-sm">Editar</button></td>
  </tr>`;}).join('');
  return shell('Vendedores',`<button class="btn btn-p btn-sm">+ Nuevo</button>`,
    `<div class="card"><div class="card-hdr"><span class="card-title">Equipo de ventas</span><span style="font-size:11px;color:var(--txt2);">${SELLERS.length} activos</span></div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Vendedor</th><th>Tienda</th><th>Notas</th><th>Estado</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`);}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
const VW={login:vLogin,dashboard:vDashboard,nueva:vNueva,preview:vPreview,historial:vHistorial,tiendas:vTiendas,vendedores:vVendedores};

function render(){
  const isLogin=VIEW==='login';
  // Sidebar permanente en DOM
  let sidebarEl=document.querySelector('.sidebar');
  if(!sidebarEl){
    sidebarEl=document.createElement('div');
    sidebarEl.className='sidebar';
    document.body.insertBefore(sidebarEl,document.getElementById('app'));
  }
  if(isLogin){sidebarEl.style.display='none';}
  else{sidebarEl.style.display='flex';sidebarEl.innerHTML=sbHTML();}
  document.getElementById('app').innerHTML=(VW[VIEW]||vLogin)();
  updateBottomNav();
}

// Arrancar
(async()=>{
  if(!DEMO_MODE&&fbAuth){
    fbAuth.onAuthStateChanged(async user=>{
      if(user&&VIEW==='login'){
        const prof=(await db.collection('usuarios').doc(user.uid).get()).data()||{};
        AUTH.user=user;AUTH.role=prof.rol||'vendedor';AUTH.name=prof.nombre_completo||user.email;AUTH.storeId=prof.tienda_id||null;
        await loadData();VIEW='dashboard';render();
      }
    });
  }
  render();
})();
</script>
</body>
</html>
